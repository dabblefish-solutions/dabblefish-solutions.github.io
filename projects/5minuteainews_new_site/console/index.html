  :root {
    --paper: #f5efe3;

    --ox-bright: #a32638;
    --ok: #2e5c38;
    --amber: #a8720f;
    --rule: #d8ccb4;
    --mono: "SF Mono", ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; }
  html { background: var(--paper); }
  body {
    font-family: var(--serif);
    color: var(--ink);
    min-height: 100vh;
    background:
      repeating-linear-gradient(0deg, transparent 0 2px, rgba(28,23,18,.012) 2px 4px),
      var(--paper);
  }

  /* ── ticker ─────────────────────────────── */
  .ticker {
    background: var(--ink); color: var(--paper);
    font-family: var(--mono); font-size: 11px; letter-spacing: .14em;
    padding: 7px 0; white-space: nowrap; overflow: hidden; text-transform: uppercase;
  }
  .ticker span { display: inline-block; padding-left: 100vw; animation: tick 40s linear infinite; }
  @keyframes tick { to { transform: translateX(-100%); } }

  /* ── masthead ───────────────────────────── */
  header { padding: 34px clamp(18px, 5vw, 64px) 0; }
  .mast { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px;
          border-bottom: 3px solid var(--ink); padding-bottom: 14px; }
  .mast h1 { font-size: clamp(26px, 4.4vw, 44px); font-weight: 700; letter-spacing: -.01em; }
  .mast h1 .five { color: var(--ox); font-style: italic; }
  .mast h1 small { font-family: var(--mono); font-size: 11px; font-weight: 400;
                   letter-spacing: .22em; color: var(--ink-soft); margin-left: 14px;
                   text-transform: uppercase; vertical-align: middle; }
  .statline { font-family: var(--mono); font-size: 11.5px; color: var(--ink-soft); letter-spacing: .06em; }
  .statline b { color: var(--ink); font-weight: 600; }
  .statline .sep { color: var(--rule); padding: 0 8px; }

  .snapnote { font-family: var(--mono); font-size: 11px; letter-spacing: .1em; color: var(--ink-soft);
              text-transform: uppercase; margin-top: 12px; padding: 8px 14px; border: 1px solid var(--rule);
              background: var(--paper-deep); display: inline-block; }
  .snapnote b { color: var(--ox); font-weight: 600; }

  main { padding: 0 clamp(18px, 5vw, 64px) 80px; max-width: 1180px; margin: 0 auto; }

  /* ── hero: latest run ───────────────────── */
  .hero { display: grid; grid-template-columns: minmax(210px, 300px) 1fr; gap: 0;
          margin-top: 34px; border: 1.5px solid var(--ink); background: var(--paper-deep);
          animation: rise .5s ease both; }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } }
  .hero-badge { padding: 26px 24px; border-right: 1.5px solid var(--ink);
                display: flex; flex-direction: column; justify-content: center; gap: 8px; }
  .hero-badge .k { font-family: var(--mono); font-size: 10.5px; letter-spacing: .22em;
                   color: var(--ink-soft); text-transform: uppercase; }
  .bigstatus { font-size: clamp(30px, 4vw, 44px); font-weight: 700; line-height: 1; }
  .bigstatus.ok { color: var(--ok); }
  .bigstatus.err { color: var(--ox-bright); }
  .bigstatus.run { color: var(--amber); }
  .hero-facts { padding: 26px 28px; display: flex; flex-wrap: wrap; gap: 26px 44px; align-items: center; }
  .fact .k { font-family: var(--mono); font-size: 10px; letter-spacing: .2em;
             color: var(--ink-soft); text-transform: uppercase; display: block; margin-bottom: 5px; }
  .fact .v { font-size: 21px; font-weight: 600; font-variant-numeric: tabular-nums; }

  /* ── sections ───────────────────────────── */
  h2 { margin: 52px 0 4px; font-size: 13px; font-family: var(--mono); font-weight: 600;
       letter-spacing: .26em; text-transform: uppercase; color: var(--ox); }
  h2::after { content: ""; display: block; margin-top: 8px; border-top: 1.5px solid var(--ink); }

  /* runs table */
  table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 12.5px; }
  th { text-align: left; font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
       color: var(--ink-soft); font-weight: 500; padding: 12px 10px 8px; border-bottom: 1px solid var(--rule); }
  td { padding: 9px 10px; border-bottom: 1px solid var(--rule); vertical-align: top;
       font-variant-numeric: tabular-nums; }
  tr:hover td { background: rgba(124,30,44,.045); }
  .chip { display: inline-block; padding: 2px 9px 3px; font-size: 10.5px; letter-spacing: .12em;
          text-transform: uppercase; border: 1px solid currentColor; border-radius: 999px; }
  .chip.ok  { color: var(--ok); }
  .chip.err { color: var(--ox-bright); background: rgba(163,38,56,.07); }
  .chip.run { color: var(--amber); animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .45; } }
  .errcell { color: var(--ox-bright); max-width: 420px; }
  .errcell details summary { cursor: pointer; color: var(--ox); }
  .muted { color: var(--ink-soft); }

  /* episodes */
  .ep { border: 1.5px solid var(--ink); background: #fbf7ee; margin-top: 22px;
        animation: rise .5s ease both; }
  .ep-head { display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
             padding: 16px 22px; border-bottom: 1px solid var(--rule); }
  .ep-date { font-family: var(--mono); font-size: 12px; letter-spacing: .18em; font-weight: 600; }
  .ep-hero { font-style: italic; font-size: 15.5px; color: var(--ink-soft); flex: 1 1 320px; line-height: 1.45; }
  .story { display: grid; grid-template-columns: 44px 110px 1fr 64px; gap: 14px;
           padding: 11px 22px; border-bottom: 1px solid var(--rule); align-items: baseline; }
  .story:last-child { border-bottom: 0; }
  .story .rank { font-family: var(--serif); font-size: 24px; font-weight: 700; color: var(--ox);
                 font-style: italic; line-height: 1; }
  .story .cat { font-family: var(--mono); font-size: 9.5px; letter-spacing: .18em; color: var(--ox);
                text-transform: uppercase; padding-top: 4px; }
  .story .head { font-size: 15.5px; font-weight: 600; line-height: 1.35; }
  .story .dek { font-size: 13px; color: var(--ink-soft); margin-top: 3px; line-height: 1.45; }
  .story .srcs { font-family: var(--mono); font-size: 10.5px; color: var(--ink-soft); text-align: right; }

  footer { margin-top: 70px; padding: 16px clamp(18px,5vw,64px); border-top: 3px solid var(--ink);
           font-family: var(--mono); font-size: 10.5px; letter-spacing: .16em;
           text-transform: uppercase; color: var(--ink-soft);
           display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .loading { font-family: var(--mono); padding: 60px 0; text-align: center; color: var(--ink-soft);
             letter-spacing: .2em; text-transform: uppercase; font-size: 11px; }
  @media (max-width: 640px) {
    .hero { grid-template-columns: 1fr; }
    .hero-badge { border-right: 0; border-bottom: 1.5px solid var(--ink); }
    .story { grid-template-columns: 34px 1fr; }
    .story .cat, .story .srcs { display: none; }
  }
</style>

const fmtDur = s => s == null ? "—" : `${Math.floor(s/60)}:${String(Math.round(s%60)).padStart(2,"0")}`;
const fmtTime = iso => iso ? new Date(iso).toLocaleString([], {month:"short", day:"numeric", hour:"2-digit", minute:"2-digit"}) : "—";
const fmtDate = iso => iso ? new Date(iso).toLocaleDateString([], {month:"long", day:"numeric", year:"numeric"}) : "—";
const esc = t => (t ?? "").toString().replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function chip(status) {
  const cls = status === "success" ? "ok" : status === "error" ? "err" : "run";
  const label = status === "success" ? "success" : status === "error" ? "failed" : "running";
  return `<span class="chip ${cls}">${label}</span>`;
}

function render(d) {
  const s = d.stats;
  document.getElementById("statline").innerHTML =
    `<b>${s.items.toLocaleString()}</b> items<span class="sep">/</span>` +
    `<b>${d.episodes.length}</b> episodes<span class="sep">/</span>` +
    `last ingest <b>${fmtTime(s.last_ingest)}</b>`;

  const latest = d.runs[0];
  const okDays = d.runs.filter(r => r.status === "success").length;

  // snapshot note derived from the newest run's started_at — not hardcoded
  document.getElementById("snapnote").innerHTML =
    `snapshot as of <b>${fmtDate(latest ? latest.started_at : null)}</b>`;

  document.getElementById("ticker").textContent =
    d.episodes.slice(0, 3).flatMap(e => e.stories.slice(0,2).map(st => st.headline)).join("  ///  ") || "no episodes yet";

  let h = "";
  if (latest) {
    const cls = latest.status === "success" ? "ok" : latest.status === "error" ? "err" : "run";
    const word = latest.status === "success" ? "ON AIR" : latest.status === "error" ? "FAILED" : "RUNNING";
    h += `<section class="hero">
      <div class="hero-badge">
        <span class="k">latest run · #${latest.id} · ${esc(latest.episode_date)}</span>
        <span class="bigstatus ${cls}">${word}</span>
      </div>
      <div class="hero-facts">
        <div class="fact"><span class="k">started</span><span class="v">${fmtTime(latest.started_at)}</span></div>
        <div class="fact"><span class="k">pipeline time</span><span class="v">${fmtDur(latest.wall_seconds)}</span></div>
        <div class="fact"><span class="k">last step</span><span class="v">${esc(latest.step) || "—"}</span></div>
        <div class="fact"><span class="k">runs ok</span><span class="v">${okDays}/${d.runs.length}</span></div>
      </div>
    </section>`;
  }

  h += `<h2>Run History</h2><table><thead><tr>
        <th>#</th><th>episode</th><th>status</th><th>started</th><th>took</th><th>last step</th><th>error</th>
        </tr></thead><tbody>`;
  for (const r of d.runs) {
    const err = r.error
      ? `<details><summary>${esc(r.error.slice(0, 52))}${r.error.length > 52 ? "…" : ""}</summary>${esc(r.error)}</details>`
      : `<span class="muted">—</span>`;
    h += `<tr><td>${r.id}</td><td>${esc(r.episode_date)}</td><td>${chip(r.status)}</td>
          <td class="muted">${fmtTime(r.started_at)}</td><td>${fmtDur(r.wall_seconds)}</td>
          <td>${esc(r.step) || "—"}</td><td class="errcell">${err}</td></tr>`;
  }
  h += `</tbody></table>`;

  h += `<h2>Episodes</h2>`;
  if (!d.episodes.length) h += `<p class="loading">no episodes yet</p>`;
  for (const [i, e] of d.episodes.entries()) {
    h += `<article class="ep" style="animation-delay:${Math.min(i * 60, 300)}ms">
      <div class="ep-head">
        <span class="ep-date">№ ${esc(e.date)}</span>
        <span class="ep-hero">${esc(e.hero) || ""}</span>
      </div>`;
    for (const st of e.stories) {
      h += `<div class="story">
        <span class="rank">${st.rank}</span>
        <span class="cat">${esc(st.category) || ""}</span>
        <span><div class="head">${esc(st.headline)}</div>${st.dek ? `<div class="dek">${esc(st.dek)}</div>` : ""}</span>
        <span class="srcs">${st.source_count ?? "?"} src</span>
      </div>`;
    }
    h += `</article>`;
  }

  document.getElementById("app").innerHTML = h;
  document.getElementById("app").classList.remove("loading");
  document.getElementById("refreshed").textContent = "snapshot · no live data";
}

render(CONSOLE_DATA);
</script>
